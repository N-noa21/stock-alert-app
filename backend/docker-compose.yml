services:
  db:
    image: postgres:16
    container_name: stock_alert_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stock_password
      POSTGRES_DB: stock_alert_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: